<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成績統計與組距計算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* 隱藏數字輸入框箭頭 */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .hidden-el { display: none; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200">
                    <i data-lucide="calculator" size="28"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">成績統計與組距計算</h1>
                    <p class="text-sm text-slate-500">輸入成績並按下 Enter 即可快速統計</p>
                </div>
            </div>
            <button id="toggleSettings" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 shadow-sm">
                <i data-lucide="settings" size="18"></i>
                <span class="hidden sm:inline">自訂組距設定</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- 左側：輸入區與概覽 -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- 成績輸入卡片 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">新增成績</label>
                    <div class="relative">
                        <input
                            id="scoreInput"
                            type="number"
                            step="any"
                            placeholder="例如：85"
                            class="w-full text-4xl font-bold text-slate-900 bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-6 outline-none focus:border-blue-500 focus:bg-white transition-all placeholder:text-slate-300"
                        />
                        <div class="absolute right-4 bottom-4 text-xs font-medium text-slate-400 bg-slate-200 px-2 py-1 rounded-md">
                            Press Enter ↵
                        </div>
                    </div>
                </div>

                <!-- 統計數字卡片 -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                        <span class="text-sm font-semibold text-slate-500 mb-1 flex items-center gap-2">
                            <i data-lucide="list-ordered" size="16"></i> 總人數
                        </span>
                        <span class="text-4xl font-black text-blue-600"><span id="totalCount">0</span> <span class="text-base font-normal text-slate-400">人</span></span>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                        <span class="text-sm font-semibold text-slate-500 mb-1 flex items-center gap-2">
                            <i data-lucide="bar-chart-3" size="16"></i> 平均分數
                        </span>
                        <span id="averageScore" class="text-4xl font-black text-emerald-600">0</span>
                    </div>
                </div>

                <!-- 歷史輸入紀錄 -->
                <div id="historyCard" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-3">
                            <h3 class="font-semibold text-slate-700">輸入紀錄</h3>
                            <button id="toggleHistory" class="flex items-center gap-1 text-xs text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-2 py-1 rounded-md transition-colors">
                                <span id="historyBtnContent" class="flex items-center gap-1"><i data-lucide="eye" size="14"></i> 顯示</span>
                            </button>
                        </div>
                        <button id="clearAll" class="hidden-el text-xs text-red-500 hover:text-red-700 font-medium px-2 py-1 rounded hover:bg-red-50 transition-colors">
                            全部清除
                        </button>
                    </div>
                    
                    <div id="historyListContainer" class="hidden-el flex-1 overflow-y-auto pr-2 mt-2 space-y-2 custom-scrollbar">
                        <!-- 動態插入紀錄 -->
                    </div>
                    <div id="historyPlaceholder" class="py-4 mt-2 flex justify-center items-center bg-slate-50 rounded-xl border-2 border-dashed border-slate-200 text-sm text-slate-400 select-none">
                        基於隱私考量，輸入紀錄已摺疊隱藏
                    </div>
                </div>
            </div>

            <!-- 右側：圖表與設定 -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- 組距分布圖表 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="bar-chart-3" class="text-blue-500" size="20"></i>
                            成績分布 (組距)
                        </h2>
                    </div>

                    <div id="distributionChart" class="space-y-4">
                        <!-- 動態插入條型圖 -->
                    </div>

                    <!-- 未分類警告 -->
                    <div id="uncategorizedWarning" class="hidden-el mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl flex items-start gap-3">
                        <i data-lucide="alert-circle" class="text-amber-500 shrink-0 mt-0.5" size="18"></i>
                        <div>
                            <h4 class="text-sm font-bold text-amber-800">有 <span id="uncategorizedCount">0</span> 筆成績未被分類</h4>
                            <p class="text-xs text-amber-600 mt-1">請檢查您的「自訂組距設定」，確保所有輸入的成績都有對應的區間。</p>
                        </div>
                    </div>
                </div>

                <!-- 自訂組距設定區塊 -->
                <div id="settingsPanel" class="hidden-el bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-slate-400">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-slate-800">自訂組距設定</h2>
                        <button id="closeSettings" class="text-slate-400 hover:text-slate-600 p-1">
                            <i data-lucide="x" size="20"></i>
                        </button>
                    </div>
                    
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div class="grid grid-cols-12 gap-2 text-xs font-semibold text-slate-500 mb-2 px-1">
                            <div class="col-span-4">顯示標籤</div>
                            <div class="col-span-3">最小值 (含)</div>
                            <div class="col-span-3">最大值 (含)</div>
                            <div class="col-span-2 text-center">操作</div>
                        </div>
                        
                        <div id="intervalsList" class="space-y-3">
                            <!-- 動態插入組距輸入框 -->
                        </div>

                        <button id="addInterval" class="mt-4 w-full py-3 border-2 border-dashed border-slate-300 rounded-lg text-slate-500 font-medium hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50 transition-colors flex items-center justify-center gap-2 text-sm">
                            <i data-lucide="plus" size="16"></i> 新增組距
                        </button>
                    </div>
                    <p class="text-xs text-slate-400 mt-4 text-center">修改設定後，長條圖會自動重新統計。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心狀態
        let scores = [];
        let intervals = [
            { id: '1', label: '90~100', min: 90, max: 100 },
            { id: '2', label: '80~89', min: 80, max: 89.99 },
            { id: '3', label: '70~79', min: 70, max: 79.99 },
            { id: '4', label: '60~69', min: 60, max: 69.99 },
            { id: '5', label: '<60', min: -999, max: 59.99 }
        ];
        let isHistoryVisible = false;

        // DOM 元素
        const scoreInput = document.getElementById('scoreInput');
        const totalCountEl = document.getElementById('totalCount');
        const averageScoreEl = document.getElementById('averageScore');
        const historyListContainer = document.getElementById('historyListContainer');
        const historyPlaceholder = document.getElementById('historyPlaceholder');
        const historyCard = document.getElementById('historyCard');
        const distributionChart = document.getElementById('distributionChart');
        const intervalsList = document.getElementById('intervalsList');
        const settingsPanel = document.getElementById('settingsPanel');
        const uncategorizedWarning = document.getElementById('uncategorizedWarning');
        const uncategorizedCountEl = document.getElementById('uncategorizedCount');

        // 初始化
        window.onload = () => {
            lucide.createIcons();
            scoreInput.focus();
            renderAll();
        };

        // 事件監聽：輸入成績
        scoreInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = parseFloat(scoreInput.value);
                if (!isNaN(val)) {
                    scores.unshift(val);
                    scoreInput.value = '';
                    renderAll();
                }
            }
        });

        // 切換設定面板
        document.getElementById('toggleSettings').onclick = () => {
            settingsPanel.classList.toggle('hidden-el');
        };
        document.getElementById('closeSettings').onclick = () => {
            settingsPanel.classList.add('hidden-el');
        };

        // 切換歷史紀錄可見性
        document.getElementById('toggleHistory').onclick = () => {
            isHistoryVisible = !isHistoryVisible;
            renderHistory();
        };

        // 清除全部
        document.getElementById('clearAll').onclick = () => {
            scores = [];
            renderAll();
        };

        // 新增組距
        document.getElementById('addInterval').onclick = () => {
            intervals.push({ id: Date.now().toString(), label: '新組距', min: 0, max: 0 });
            renderIntervals();
            renderChart();
        };

        // 渲染全部
        function renderAll() {
            renderStats();
            renderHistory();
            renderChart();
            renderIntervals();
        }

        // 統計數據
        function renderStats() {
            const count = scores.length;
            const avg = count > 0 ? (scores.reduce((a, b) => a + b, 0) / count).toFixed(2) : 0;
            totalCountEl.textContent = count;
            averageScoreEl.textContent = avg;
        }

        // 歷史紀錄
        function renderHistory() {
            const btnContent = document.getElementById('historyBtnContent');
            const clearBtn = document.getElementById('clearAll');
            
            if (isHistoryVisible) {
                historyListContainer.classList.remove('hidden-el');
                historyPlaceholder.classList.add('hidden-el');
                historyCard.classList.add('h-64');
                btnContent.innerHTML = '<i data-lucide="eye-off" size="14"></i> 隱藏';
                clearBtn.classList.remove('hidden-el');
                
                historyListContainer.innerHTML = scores.length === 0 
                    ? `<div class="h-full flex items-center justify-center text-slate-400 text-sm">尚未輸入任何成績</div>`
                    : scores.map((s, i) => `
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-100 group">
                            <div class="flex items-center gap-3">
                                <span class="text-xs font-medium text-slate-400 w-6">#${scores.length - i}</span>
                                <span class="font-bold text-slate-700 text-lg">${s}</span>
                            </div>
                            <button onclick="deleteScore(${i})" class="text-slate-300 hover:text-red-500 p-1 rounded-md hover:bg-red-50 transition-colors">
                                <i data-lucide="x" size="18"></i>
                            </button>
                        </div>
                    `).join('');
            } else {
                historyListContainer.classList.add('hidden-el');
                historyPlaceholder.classList.remove('hidden-el');
                historyCard.classList.remove('h-64');
                btnContent.innerHTML = '<i data-lucide="eye" size="14"></i> 顯示';
                clearBtn.classList.add('hidden-el');
            }
            lucide.createIcons();
        }

        function deleteScore(index) {
            scores.splice(index, 1);
            renderAll();
        }

        // 渲染圖表
        function renderChart() {
            let categorizedTotal = 0;
            const distribution = intervals.map(inv => {
                const count = scores.filter(s => s >= inv.min && s <= inv.max).length;
                categorizedTotal += count;
                return { ...inv, count };
            });

            const maxCount = Math.max(...distribution.map(d => d.count), 1);
            const uncategorized = scores.length - categorizedTotal;

            distributionChart.innerHTML = distribution.map(item => `
                <div class="relative">
                    <div class="flex justify-between text-sm font-medium text-slate-600 mb-1">
                        <span>${item.label}</span>
                        <span class="font-bold text-slate-900">${item.count} 人</span>
                    </div>
                    <div class="w-full h-4 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 rounded-full transition-all duration-500 ease-out" 
                             style="width: ${(item.count / maxCount) * 100}%"></div>
                    </div>
                </div>
            `).join('');

            if (uncategorized > 0) {
                uncategorizedWarning.classList.remove('hidden-el');
                uncategorizedCountEl.textContent = uncategorized;
            } else {
                uncategorizedWarning.classList.add('hidden-el');
            }
        }

        // 渲染組距設定列表
        function renderIntervals() {
            intervalsList.innerHTML = intervals.map(inv => `
                <div class="grid grid-cols-12 gap-2 items-center">
                    <div class="col-span-4">
                        <input type="text" value="${inv.label}" onchange="updateInterval('${inv.id}', 'label', this.value)"
                               class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-3">
                        <input type="number" value="${inv.min}" onchange="updateInterval('${inv.id}', 'min', this.value)"
                               class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-3">
                        <input type="number" value="${inv.max}" onchange="updateInterval('${inv.id}', 'max', this.value)"
                               class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:border-blue-500">
                    </div>
                    <div class="col-span-2 flex justify-center">
                        <button onclick="removeInterval('${inv.id}')" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                            <i data-lucide="trash-2" size="16"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateInterval(id, field, value) {
            const inv = intervals.find(i => i.id === id);
            if (inv) {
                inv[field] = field === 'label' ? value : parseFloat(value) || 0;
                renderChart();
            }
        }

        function removeInterval(id) {
            intervals = intervals.filter(i => i.id !== id);
            renderIntervals();
            renderChart();
        }
    </script>
</body>
</html>
